<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>emoji translator — aparna</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Space Mono', monospace; background: #fffbe6; overflow-x: hidden; }

    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }

    nav {
      position: sticky; top: 0; z-index: 200;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 32px;
      background: rgba(255, 251, 230, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid #1a1a2e;
    }
    .nav-links { display: flex; gap: 22px; }
    .nav-links a { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(26,26,46,0.4); text-decoration: none; }
    .nav-links a:hover { color: #1a1a2e; }

    .ui { max-width: 600px; margin: 0 auto; padding: 20px 28px 80px; position: relative; z-index: 10; }

    .display {
      min-height: 60px; padding: 12px 16px;
      border: 2px solid rgba(26,26,46,0.15);
      background: white; font-size: 30px;
      letter-spacing: 6px; word-break: break-all;
      margin-bottom: 6px;
    }
    .display.empty::before {
      content: 'click emojis below...';
      font-size: 13px; letter-spacing: 1px;
      color: rgba(26,26,46,0.2); font-style: italic;
      font-family: 'Space Mono', monospace;
    }
    .clear-row { text-align: right; margin-bottom: 20px; }
    .clear-btn { font-family: 'Space Mono', monospace; font-size: 11px; background: none; border: none; color: rgba(26,26,46,0.3); cursor: pointer; }
    .clear-btn:hover { color: #ff6b9d; }

    .picker-label { font-size: 11px; color: rgba(26,26,46,0.3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
    .picker { display: flex; flex-wrap: wrap; gap: 9px; margin-bottom: 24px; }
    .ep {
      width: 46px; height: 46px; font-size: 22px; border-radius: 50%;
      border: 2px solid rgba(26,26,46,0.12); background: white;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, border-color 0.1s, box-shadow 0.1s;
      user-select: none;
    }
    .ep:hover { transform: scale(1.2); border-color: #ff6b9d; box-shadow: 0 3px 10px rgba(255,107,157,0.25); }
    .ep:active { transform: scale(0.9); }

    .output { border: 2px solid rgba(26,26,46,0.12); background: white; display: none; }
    .output.show { display: block; }
    .out-bar { padding: 9px 18px; border-bottom: 2px solid rgba(26,26,46,0.08); display: flex; justify-content: space-between; align-items: center; }
    .out-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: rgba(26,26,46,0.35); }
    .out-echo { font-size: 20px; letter-spacing: 2px; }
    .out-text { padding: 22px 20px; font-size: 17px; line-height: 1.9; color: #1a1a2e; }
    .out-caption { padding: 0 20px 14px; font-size: 11px; color: rgba(26,26,46,0.28); font-style: italic; }
    .shuffle-btn {
      display: block; width: calc(100% - 40px); margin: 0 20px 16px;
      font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; padding: 10px;
      background: none; border: 2px solid rgba(26,26,46,0.15); color: rgba(26,26,46,0.4); cursor: pointer;
    }
    .shuffle-btn:hover { border-color: #ff6b9d; color: #ff6b9d; }

    @keyframes pop { 0%{transform:scale(0.96)} 60%{transform:scale(1.02)} 100%{transform:scale(1)} }
    .popping { animation: pop 0.22s ease forwards; }
  </style>
</head>
<body>

<nav>
  <a href="index.html">aparna yellamraju</a>
  <div class="nav-links">
    <a href="index.html">home</a>
    <a href="about.html">about</a>
  </div>
</nav>

<div class="ui">
  <div class="display empty" id="display"></div>
  <div class="clear-row"><button class="clear-btn" onclick="clearAll()">✕ clear</button></div>
  <div class="picker-label">pick your emojis</div>
  <div class="picker" id="picker"></div>
  <div class="output" id="output">
    <div class="out-bar" id="outBar">
      <span class="out-label">translation</span>
      <span class="out-echo" id="outEcho"></span>
    </div>
    <div class="out-text" id="outText"></div>
    <div class="out-caption" id="outCaption"></div>
    <button class="shuffle-btn" onclick="shuffle()">↻ try again</button>
  </div>
</div>

<script>
// ── p5 sketch ──────────────────────────────────────────────────────────────
let bubbles = [];

let colors = [
  [255, 179, 209],
  [179, 207, 255],
  [179, 255, 212],
  [255, 221, 179],
  [212, 179, 255],
  [255, 251, 179]
];

function setup() {
  createCanvas(windowWidth, windowHeight);
  noStroke();

  for (let i = 0; i < 18; i++) {
    bubbles.push({
      x:    random(width),
      y:    random(height),
      r:    random(18, 55),
      vx:   random(-0.4, 0.4),
      vy:   random(-0.3, 0.3),
      ci:   floor(random(colors.length)),
      seed: random(1000)
    });
  }
}

function draw() {
  background(255, 251, 230);
  let t = frameCount * 0.018;

  for (let b of bubbles) {
    b.x += b.vx + sin(t + b.seed) * 0.3;
    b.y += b.vy + cos(t + b.seed * 0.7) * 0.2;
    if (b.x < -b.r) b.x = width + b.r;
    if (b.x > width + b.r) b.x = -b.r;
    if (b.y < -b.r) b.y = height + b.r;
    if (b.y > height + b.r) b.y = -b.r;

    let c = colors[b.ci];
    fill(c[0], c[1], c[2], 140);
    circle(b.x, b.y, b.r * 2);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

// ── emojiss ────────────────────────────────────────────────────────────
let EMOJIS = [
  '😭','💀','🗿','😂','🤌','🌙','🤯','🫠','👀','🧃',
  '🌸','⚡','🐱','🍕','🚗','🐦','🥪','💸','🎉','😤',
  '🫡','🤷','🙈','🥺','😳','🔥','💅','🧠','😵','🫣',
  '🪿','🐶','🐠','🦙','🐿️','🦝','☕','🎧','🛍️','🔑'
];

let BAR_COLORS = ['#ffb3d1','#b3cfff','#b3ffd4','#ffddb3','#d4b3ff','#fffbb3'];

let PHRASES = [
  "I went in for a hug and my dentist was already reaching for a tool.",
  "I waved at someone who was waving at the person behind me and it is too late to undo that.",
  "I said you too when the waiter told me to enjoy my meal and I am still thinking about it.",
  "I called my teacher mom in front of the whole class and just sat there.",
  "I sent a voice note by accident and had to pretend I meant to do that.",
  "I walked into a glass door in front of five strangers and kept walking.",
  "I liked a photo from 2016 and had to fake my own death.",
  "I confidently gave someone directions and had absolutely no idea where I was sending them.",
  "I said I would be there in five minutes and I had not left yet.",
  "I laughed at a joke I did not hear and then had to keep nodding.",
  "I burned my tongue on soup and decided the soup did it on purpose.",
  "I set three alarms and slept through all three of them like they were suggestions.",
  "My cat knocked something off the table, looked me in the eye, and walked away.",
  "I googled something embarrassing and then checked if anyone could see my screen.",
  "I rehearsed an entire conversation in my head and then said absolutely none of it.",
  "I tripped on flat ground and looked back at the floor like something was there.",
  "I put my phone down to find it and then could not find my phone.",
  "I started a sentence confidently and had no idea how it was going to end.",
  "I snooze my alarm seven times and then act surprised that I am late.",
  "I opened the fridge, stared into it, closed it, and opened it again thirty seconds later.",
  "I replied to a group chat thinking it was a private message and now I live somewhere else.",
  "I bought groceries, forgot what I needed, and came home with everything except the thing.",
  "I told someone I had seen the movie and then had to fake the entire conversation.",
  "I walked into a room and completely forgot why and stood there making peace with it.",
  "I ordered something spicy because I felt brave and then immediately regretted my whole life.",
  "I ran to catch the elevator and the person inside watched me and let the doors close.",
  "I mispronounced a word in front of everyone and then said it wrong again trying to fix it.",
  "I replied all when I really should not have replied all.",
  "I told my friend I was five minutes away when I was still at home putting on shoes.",
  "I nodded the entire time someone was talking and understood absolutely nothing."
];

let CAPTIONS = [
  "yeah our translator is really great.",
  "totally accurate. trust the process.",
  "certified correct by no one.",
  "a linguist saw this and left the building.",
  "we stand behind this translation fully.",
  "five stars. zero accuracy.",
  "the original text was ignored. we think that's better.",
  "our team worked very hard on this."
];

let picked = [];
let colorIdx = 0;

let pickerEl = document.getElementById('picker');
EMOJIS.forEach(function(em) {
  let btn = document.createElement('button');
  btn.className = 'ep';
  btn.textContent = em;
  btn.onclick = function() { addEmoji(em); };
  pickerEl.appendChild(btn);
});

function addEmoji(em) {
  picked.push(em);
  let d = document.getElementById('display');
  d.classList.remove('empty');
  d.textContent = picked.join(' ');
  doTranslate();
}

function doTranslate() {
  if (picked.length === 0) return;
  let phrase  = PHRASES[floor(random(PHRASES.length))];
  let caption = CAPTIONS[floor(random(CAPTIONS.length))];
  let barCol  = BAR_COLORS[colorIdx % BAR_COLORS.length];
  colorIdx++;

  let out = document.getElementById('output');
  document.getElementById('outBar').style.background = barCol;
  document.getElementById('outEcho').textContent = picked.join(' ');
  document.getElementById('outText').textContent = phrase;
  document.getElementById('outCaption').textContent = caption;
  out.classList.add('show');
  out.classList.remove('popping');
  void out.offsetWidth;
  out.classList.add('popping');
}

function shuffle() {
  doTranslate();
}

function clearAll() {
  picked = [];
  let d = document.getElementById('display');
  d.textContent = '';
  d.classList.add('empty');
  document.getElementById('output').classList.remove('show');
}
</script>
</body>
</html>
