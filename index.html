<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aparna yellamraju</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Space Mono', monospace;
      background: #fdf4ff;
      color: #1a1a2e;
      display: flex;
      flex-direction: column;
    }

    /* pastel blobs */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(75px);
      opacity: 0.52;
      animation: drift ease-in-out infinite alternate;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 22px) scale(1.1); }
    }
    .b1 { width: 480px; height: 480px; background: #ffb3d1; top: -110px; left: -90px; animation-duration: 11s; }
    .b2 { width: 360px; height: 360px; background: #d4b3ff; top: 8%; right: -70px; animation-duration: 15s; animation-delay: -5s; }
    .b3 { width: 400px; height: 400px; background: #b3cfff; bottom: -70px; left: 12%; animation-duration: 9s; animation-delay: -7s; }
    .b4 { width: 280px; height: 280px; background: #b3ffd4; bottom: 10%; right: 10%; animation-duration: 13s; animation-delay: -3s; }
    .b5 { width: 240px; height: 240px; background: #fffbb3; top: 40%; left: 30%; animation-duration: 17s; animation-delay: -10s; }

    nav {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 28px;
      background: rgba(253, 244, 255, 0.78);
      backdrop-filter: blur(14px);
      border-bottom: 2px solid #1a1a2e;
    }

    nav a {
      font-size: 14px;
      color: #1a1a2e;
      text-decoration: none;
    }
    nav a:hover { text-decoration: underline; }

    .nav-links { display: flex; gap: 24px; }

    .hero {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 0 28px;
      text-align: center;
    }

    h1 {
      font-size: clamp(36px, 8vw, 80px);
      font-weight: 700;
      line-height: 1.1;
    }

    .cards {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      padding: 14px 28px;
      background: rgba(255, 255, 255, 0.75);
      border: 2px solid #1a1a2e;
      text-decoration: none;
      color: #1a1a2e;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Space Mono', monospace;
    }

    .card:hover { background: rgba(255, 255, 255, 0.95); }

    .card:nth-child(1) { border-top: 4px solid #ffb3d1; }
    .card:nth-child(2) { border-top: 4px solid #b3cfff; }
    .card:nth-child(3) { border-top: 4px solid #d4b3ff; }
  </style>
</head>
<body>

<div class="bg">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>
  <div class="blob b5"></div>
</div>

<nav>
  <a href="index.html">aparna yellamraju</a>
  <div class="nav-links">
    <a href="index.html">home</a>
    <a href="about.html">about</a>
  </div>
</nav>

<div class="hero">
  <h1>aparna<br>yellamraju</h1>
  <div class="cards">
    <a href="translator.html" class="card">surprise me</a>
    <a href="camera.html" class="card">surprise me</a>
    <a href="visualizer.html" class="card">surprise me</a>
  </div>
</div>

</body>
</html>
