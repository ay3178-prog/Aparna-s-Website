<script>
// dot viz sketch
let t = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  noStroke();
  colorMode(HSB, 360, 100, 100);
}

function draw() {
  background(300, 8, 100);
  t += 0.05;

  let space = 25;
  let movement = map(mouseX, 0, width, 15, 70);

  for (let x = 0; x < width; x += space) {
    for (let y = 0; y < height; y += space) {
      let shift1 = sin(t + (x + y) * 0.05);
      let shift2 = sin(t + (x - y) * 0.05);

      let x1 = x + shift1 * movement;
      let y1 = y + shift1 * movement;
      let x2 = x + shift2 * movement;
      let y2 = y - shift2 * movement;

      let size1 = 6 + shift1 * 5;
      let size2 = 6 + shift2 * 5;

      // hue sequence: pink -> purple -> blue -> green -> yellow (pastel, skip orange)
      let hue1 = map(x + y + frameCount, 0, width + height + 360, 60, 360);
      let hue2 = map(x - y + frameCount, -height, width + 360, 60, 360);

      fill(hue1, 38, 100);
      circle(x1, y1, size1);
      fill(hue2, 42, 99);
      circle(x2, y2, size2);
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
