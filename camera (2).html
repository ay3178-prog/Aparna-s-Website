<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>camera — aparna</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fdf4ff; overflow: hidden; }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 32px;
      background: rgba(253, 244, 255, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 3px solid #1a1a2e;
    }
    .nav-links { display: flex; gap: 22px; }
    .nav-links a { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(26,26,46,0.4); text-decoration: none; }
    .nav-links a:hover { color: #1a1a2e; }
    canvas { display: block; }
  </style>
</head>
<body>

<nav>
  <a href="../index.html">aparna yellamraju</a>
  <div class="nav-links">
    <a href="../index.html">home</a>
    <a href="../about.html">about</a>
  </div>
</nav>

<script>
let cam;
let camReady = false;
let tiles = [];
let navH = 50;

let BASE_SIZE = 18;
let cols, rows;

let palettes = [
  [[255,179,209],[255,200,220],[255,220,235]],
  [[179,207,255],[200,220,255],[220,235,255]],
  [[179,255,212],[200,255,225],[220,255,235]],
  [[255,221,179],[255,235,200],[255,245,220]],
  [[212,179,255],[225,200,255],[240,220,255]],
  [[255,251,179],[255,253,200],[255,254,220]]
];

function setup() {
  navH = document.querySelector('nav').offsetHeight;
  createCanvas(windowWidth, windowHeight - navH);
  noStroke();

  cam = createCapture(VIDEO, function() {
    camReady = true;
  });
  cam.size(320, 240);
  cam.hide();

  buildTiles();
}

function buildTiles() {
  tiles = [];
  cols = floor(width  / BASE_SIZE);
  rows = floor(height / BASE_SIZE);

  for (let c = 0; c < cols; c++) {
    for (let r = 0; r < rows; r++) {
      tiles.push({
        cx:         (c + 0.5) * BASE_SIZE,
        cy:         (r + 0.5) * BASE_SIZE,
        x:          (c + 0.5) * BASE_SIZE,
        y:          (r + 0.5) * BASE_SIZE,
        sz:         BASE_SIZE,
        brightness: random(0.3, 0.7),
        col:        [240, 220, 255],
        vx:         0,
        vy:         0,
        seed:       random(1000),
        shape:      floor(random(3))
      });
    }
  }
}

function draw() {
  background(253, 244, 255);

  let t = frameCount * 0.018;
  let globalPal = floor(t * 0.1) % palettes.length;

  if (camReady) {
    cam.loadPixels();
  }

  for (let i = 0; i < tiles.length; i++) {
    let tile = tiles[i];

    let b = 0.5;

    if (camReady && cam.pixels.length > 0) {
      let camX = floor(map(tile.cx, 0, width,  cam.width - 1, 0));
      let camY = floor(map(tile.cy, 0, height, 0, cam.height - 1));
      camX = constrain(camX, 0, cam.width  - 1);
      camY = constrain(camY, 0, cam.height - 1);
      let idx = (camY * cam.width + camX) * 4;
      let r = cam.pixels[idx]     || 128;
      let g = cam.pixels[idx + 1] || 128;
      let bv = cam.pixels[idx + 2] || 128;
      b = (r * 0.299 + g * 0.587 + bv * 0.114) / 255;
    } else {
      b = noise(tile.cx * 0.006, tile.cy * 0.006, t * 0.4);
    }

    tile.brightness = lerp(tile.brightness, b, 0.12);

    let targetSz = map(tile.brightness, 0, 1, BASE_SIZE * 0.28, BASE_SIZE * 1.6);
    tile.sz = lerp(tile.sz, targetSz, 0.1);

    let zoneIdx = (floor(tile.brightness * palettes.length) + globalPal) % palettes.length;
    let palette = palettes[zoneIdx];
    let shade = floor(noise(tile.cx * 0.004 + t * 0.08, tile.cy * 0.004) * palette.length);
    shade = constrain(shade, 0, palette.length - 1);
    let target = palette[shade];

    tile.col[0] = lerp(tile.col[0], target[0], 0.07);
    tile.col[1] = lerp(tile.col[1], target[1], 0.07);
    tile.col[2] = lerp(tile.col[2], target[2], 0.07);

    let wobble = tile.brightness * 3.2;
    let wAngle = noise(tile.cx * 0.008, tile.cy * 0.008, t * 0.45) * TWO_PI * 2;
    tile.vx = lerp(tile.vx, cos(wAngle) * wobble, 0.1);
    tile.vy = lerp(tile.vy, sin(wAngle) * wobble, 0.1);
    tile.x  = lerp(tile.x, tile.cx + tile.vx, 0.16);
    tile.y  = lerp(tile.y, tile.cy + tile.vy, 0.16);

    fill(tile.col[0], tile.col[1], tile.col[2], 215);

    push();
    translate(tile.x, tile.y);

    let s = tile.sz;
    if (tile.shape === 0) {
      rectMode(CENTER);
      rect(0, 0, s, s);
    } else if (tile.shape === 1) {
      circle(0, 0, s);
    } else {
      beginShape();
      vertex(0,      -s * 0.55);
      vertex(s * 0.45, 0);
      vertex(0,       s * 0.55);
      vertex(-s * 0.45, 0);
      endShape(CLOSE);
    }
    pop();
  }
}

function windowResized() {
  navH = document.querySelector('nav').offsetHeight;
  resizeCanvas(windowWidth, windowHeight - navH);
  buildTiles();
}
</script>
</body>
</html>
